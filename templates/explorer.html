{% extends 'layout.html' %}

{% block body %}
    <script type="module" src="http://localhost:3000/@vite/client"></script>
    <script type="module" src="http://localhost:3000/main.jsx"></script>
    <script type="module" src="http://localhost:3000/src/explorerUI.jsx"></script>
    <script type="module" src="http://localhost:3000/src/explorerAnalysis.jsx"></script>
    <script type="module" src="http://localhost:3000/src/jsColor.jsx"></script>

    <div class="flex h-screen bg-gray-100 relative">
        <aside id="sidebar"
               class="explorer-sidebar-container transform transition-transform duration-300 translate-x-0 absolute left-0 top-0 z-50 bg-white">

            <div class="px-12 py-6">
                <a href="#" class="explorer-sidebar-header">Music Explorer</a>
            </div>

            <nav class="flex-1 px-4 py-6">
                <ul class="flex flex-col gap-5">
                    <li>
                        <a href="#" class="explorer-sidebar-labels">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                 stroke="currentColor" class="explorer-sidebar-icon">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      d="M14.25 6.087c0-.355.186-.676.401-.959.221-.29.349-.634.349-1.003 0-1.036-1.007-1.875-2.25-1.875s-2.25.84-2.25 1.875c0 .369.128.713.349 1.003.215.283.401.604.401.959v0a.64.64 0 0 1-.657.643 48.39 48.39 0 0 1-4.163-.3c.186 1.613.293 3.25.315 4.907a.656.656 0 0 1-.658.663v0c-.355 0-.676-.186-.959-.401a1.647 1.647 0 0 0-1.003-.349c-1.036 0-1.875 1.007-1.875 2.25s.84 2.25 1.875 2.25c.369 0 .713-.128 1.003-.349.283-.215.604-.401.959-.401v0c.31 0 .555.26.532.57a48.039 48.039 0 0 1-.642 5.056c1.518.19 3.058.309 4.616.354a.64.64 0 0 0 .657-.643v0c0-.355-.186-.676-.401-.959a1.647 1.647 0 0 1-.349-1.003c0-1.035 1.008-1.875 2.25-1.875 1.243 0 2.25.84 2.25 1.875 0 .369-.128.713-.349 1.003-.215.283-.4.604-.4.959v0c0 .333.277.599.61.58a48.1 48.1 0 0 0 5.427-.63 48.05 48.05 0 0 0 .582-4.717.532.532 0 0 0-.533-.57v0c-.355 0-.676.186-.959.401-.29.221-.634.349-1.003.349-1.035 0-1.875-1.007-1.875-2.25s.84-2.25 1.875-2.25c.37 0 .713.128 1.003.349.283.215.604.401.96.401v0a.656.656 0 0 0 .658-.663 48.422 48.422 0 0 0-.37-5.36c-1.886.342-3.81.574-5.766.689a.578.578 0 0 1-.61-.58v0Z"/>
                            </svg>
                            Pattern Recognition
                        </a>
                    </li>
                    <li>
                        <a href="#" class="explorer-sidebar-labels">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                 stroke="currentColor" class="explorer-sidebar-icon">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m5.231 13.481L15 17.25m-4.5-15H5.625c-.621 0-1.125.504-1.125 1.125v16.5c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Zm3.75 11.625a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z"/>
                            </svg>
                            Classification
                        </a>
                    </li>
                    <li>
                        <a href="#" class="explorer-sidebar-labels">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                 stroke="currentColor" class="explorer-sidebar-icon">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.832 19.82a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487Zm0 0L19.5 7.125"/>
                            </svg>
                            Transcription
                        </a>
                    </li>
                    <li>
                        <a href="#" class="explorer-sidebar-labels">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                 stroke="currentColor" class="explorer-sidebar-icon">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      d="M9 9V4.5M9 9H4.5M9 9 3.75 3.75M9 15v4.5M9 15H4.5M9 15l-5.25 5.25M15 9h4.5M15 9V4.5M15 9l5.25-5.25M15 15h4.5M15 15v4.5m0-4.5 5.25 5.25"/>
                            </svg>
                            Similarity
                        </a>
                    </li>
                    <li>
                        <a href="#" class="explorer-sidebar-labels">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                 stroke="currentColor" class="explorer-sidebar-icon">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      d="M8.625 12a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H8.25m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H12m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 0 1-2.555-.337A5.972 5.972 0 0 1 5.41 20.97a5.969 5.969 0 0 1-.474-.065 4.48 4.48 0 0 0 .978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25Z"/>
                            </svg>
                            Chat
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="px-4 py-6">
                <ul class="flex flex-col gap-5">
                    <li>
                        <a href="#" class="explorer-sidebar-labels">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                 stroke="currentColor" class="explorer-sidebar-icon">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 5.25h.008v.008H12v-.008Z"/>
                            </svg>
                            About
                        </a>
                    </li>
                    <li>
                        <a href="#" class="explorer-sidebar-labels">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                 stroke="currentColor" class="explorer-sidebar-icon">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      d="m9.75 9.75 4.5 4.5m0-4.5-4.5 4.5M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
                            </svg>
                            Exit
                        </a>
                    </li>
                </ul>
            </div>
{#            <button id="toggleSidebar"#}
{#                    class="absolute bottom-8 -right-6 bg-white flex items-center justify-center rounded shadow">#}
{#                <svg id="sidebarIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"#}
{#                     stroke-width="1.5" stroke="currentColor" class="explorer-sidebar-icon">#}
{#                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5"/>#}
{#                </svg>#}
{#            </button>#}
        </aside>

        <div id="spectrogramOptions" class="absolute bottom-4 right-80 w-72 hidden">
            <div class="flex gap-8">
                <div class="flex flex-col items-center">
                    <div class="explorer-spectoptions-tooltip">
                        <label id="tooltip-fMin" class="explorer-spectoptions-label">200 Hz</label>
                    </div>
                    <input type="range" id="fMin" name="fMin" min="0" max="4000" value="200" step="100"
                           class="z-10 pointer-events-auto">
                    <label for="fMin" class="explorer-spectoptions-label">Minimum Hz</label>
                </div>
                <div class="flex flex-col items-center">
                    <div id="tooltip-fMax" class="explorer-spectoptions-tooltip ">
                        <label id="tooltop-fMax" class="explorer-spectoptions-label">8000 Hz</label>
                    </div>
                    <input type="range" id="fMax" name="fMax" min="4000" max="11000" value="8000" step="100"
                           class="z-10 pointer-events-auto">
                    <label for="fMax" class="explorer-spectoptions-label">Maximum Hz</label>
                </div>
                <div class="flex flex-col items-center">
                    <label class="explorer-spectoptions-label"> Spectrogram Type</label>
                    <select id="spectTypeSelect" class="w-32">
                        <option class="explorer-spectoptions-label" selected>Linear</option>
                        <option class="explorer-spectoptions-label">Log</option>
                        <option class="explorer-spectoptions-label">Mel</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="absolute top-4 right-8 flex items-center space-x-2">
            <button id="explorer-colour-picker" data-jscolor="{
                format:'hex',
                backgroundColor:'rgba(245,245,245,1)',
                borderColor:'rgba(0,0,0,1)',
                borderRadius:12,
                sliderSize:9,
                value:'rgba(239,155,151,1)',
                onChange: 'colourChanged()'
                }" class="w-8 h-8"></button>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                 stroke="currentColor" class="w-8 h-8">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M9.53 16.122a3 3 0 0 0-5.78 1.128 2.25 2.25 0 0 1-2.4 2.245 4.5 4.5 0 0 0 8.4-2.245c0-.399-.078-.78-.22-1.128Zm0 0a15.998 15.998 0 0 0 3.388-1.62m-5.043-.025a15.994 15.994 0 0 1 1.622-3.395m3.42 3.42a15.995 15.995 0 0 0 4.764-4.648l3.876-5.814a1.151 1.151 0 0 0-1.597-1.597L14.146 6.32a15.996 15.996 0 0 0-4.649 4.763m3.42 3.42a6.776 6.776 0 0 0-3.42-3.42"/>
            </svg>
        </div>


        <button id="viewAsBtn" class="flex font-accent items-center gap-4 text-xl explorer-viewas-button">
            View as
            <div id="dropdownMenu"
                 class="absolute bottom-14 right-0 w-36 bg-white shadow-lg rounded-lg p-2 flex flex-col gap-2 opacity-0 invisible transition-all duration-150">
                <a href="#" class="explorer-viewas-option">Waveform</a>
                <a href="#" class="explorer-viewas-option">Spectrogram</a>
            </div>
        </button>

        <div class="explorer-play-pause-container">
            <button id="explorer-play-button">
                <svg id="explorer-play-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                     stroke-width="1.5"
                     stroke="currentColor" class="size-8">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347a1.125 1.125 0 0 1-1.667-.986V5.653Z"/>
                </svg>
            </button>
            <button id="explorer-rewind-button">
                <svg id="explorer-rewind-icon" xmlns="http://www.w3.org/2000/svg"
                     fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                     stroke="currentColor" class="size-8">
                    <line x1="3" y1="3" x2="3" y2="21" stroke="currentColor" stroke-width="1.5"/>
                    <g transform="translate(24,0) scale(-1,1)">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347a1.125 1.125 0 0 1-1.667-.986V5.653Z"/>
                    </g>
                </svg>
            </button>
            <button id="explorer-loop-button">
                <svg id="explorer-loop-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                     stroke-width="1.5"
                     stroke="currentColor" class="size-8">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99"/>
                </svg>
            </button>
        </div>

        <div class="waveform-container z-0">
            <div class="w-full" id="waveform"></div>
            <div class="waveform-time" id="waveform-time">0:00</div>
        </div>

        {% if audio_url %}
            <script>
                window.audio_url = {{ audio_url|tojson }};
            </script>
        {% else %}
            <script>
                window.audio_url = null;
            </script>
        {% endif %}
    </div>

{% endblock %}
